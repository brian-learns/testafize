[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = [
    "E",   # Pycodestyle errors
    "F",   # Pyflakes (catches undefined names / unused variables)
    "B",   # Bugbear (catches common design anti-patterns)
    "S",   # Bandit Automated Security checks
    "I",   # Isort (enforces clean import sorting structures)
    "N",   # PEP8 Naming convention enforcement
    "RUF"  # Ruff-specific absolute modern rules
]
ignore = [
    "S101", # Allows 'assert' statements for pytest modules
    "E501"  # Let the formatter handle long agent lines, don't trigger lint errors
]


[tool.bandit]
skips = ["B101", "B404", "B602"]

[tool.interrogate]
fail-under = 90
exclude = ["tests"]
ignore-init-method = true
ignore-module = true

[tool.ty]
rules = { all = "error" }
